<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Game</title>
    <link rel="stylesheet" href="game.css"/>
</head>
<body>
    <div class="game-container">
  <h1>Fastest Presser</h1>

  <input id="timeInput" type="number" placeholder="Set Seconds">
  <button id="btn">Start game</button>

  <div class="key-boxes">
    <div class="key-box" id="sBox">Press S</div>
    <div class="key-box" id="lBox">Press L</div>
  </div>

  <p id="output">Waiting for key press...</p>
  <button id="restartBtn">Restart</button>

</div>


    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   <script src="game.js"></script>
</body>
</html>
